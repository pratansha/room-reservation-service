spring:
  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reservation-group

server:
  port: 8080

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000

credit:
  card:
    base-url: http://localhost:9090/host/credit-card-payment-api